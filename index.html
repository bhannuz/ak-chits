<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartSplit Pro | Premium Trip Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050508; --bg2: #0e0e14; --bg3: #16161f; --card: #111118;
  --border: rgba(255,255,255,0.06); --border2: rgba(255,255,255,0.12);
  --text: #f8f9fa; --muted: #94a3b8;
  --accent: #6366f1; --accent2: #818cf8;
  --green: #10b981; --red: #ef4444; --amber: #f59e0b;
  --radius: 20px; --radius-sm: 12px;
  --font-main: 'Plus Jakarta Sans', sans-serif;
  --font-head: 'Space Grotesk', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-main); background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

/* ─── AUTH SCREENS ─── */
.screen { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; background: var(--bg); }
.auth-box { background: var(--bg2); border: 1px solid var(--border2); border-radius: 28px; padding: 48px 40px; width: 100%; max-width: 400px; text-align: center; }
.big-logo { font-family: var(--font-head); font-size: 32px; font-weight: 700; margin-bottom: 30px; letter-spacing: -1px; }
.big-logo span { color: var(--accent); }

/* ─── NAVBAR ─── */
.navbar { height: 72px; background: rgba(5, 5, 8, 0.8); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 32px; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(20px); }
.nav-logo { font-family: var(--font-head); font-size: 22px; font-weight: 700; }
.nav-logo span { color: var(--accent); }

/* ─── LAYOUT ─── */
.main { padding: 32px; max-width: 1200px; margin: 0 auto; }
.grid-2 { display: grid; grid-template-columns: 1fr 340px; gap: 24px; margin-top: 24px; }
@media(max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }

/* ─── COMPONENTS ─── */
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 24px; position: relative; }
.stat-lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; font-weight: 700; }
.stat-val { font-family: var(--font-head); font-size: 28px; font-weight: 700; margin-top: 8px; }

.card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 24px; }
.card-title { font-family: var(--font-head); font-size: 18px; margin-bottom: 20px; display: flex; justify-content: space-between; }

.exp-item { display: flex; align-items: center; gap: 16px; padding: 16px 0; border-bottom: 1px solid var(--border); }
.exp-icon { width: 48px; height: 48px; border-radius: 14px; background: var(--bg3); display: flex; align-items: center; justify-content: center; font-size: 20px; }

.btn { padding: 12px 24px; border-radius: var(--radius-sm); border: none; cursor: pointer; font-weight: 700; transition: 0.2s; font-family: var(--font-main); }
.btn-primary { background: var(--accent); color: white; }
.btn-ghost { background: var(--bg3); color: var(--text); }
.fi { width: 100%; padding: 14px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 12px; color: #fff; margin-bottom: 15px; outline: none; }

.prog-track { height: 6px; background: var(--bg3); border-radius: 10px; margin-top: 10px; overflow: hidden; }
.prog-fill { height: 100%; background: var(--accent); transition: width 1s; }

.hidden { display: none !important; }
.modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 20000; display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(8px); }
</style>
</head>
<body>

<div id="auth-screen" class="screen">
    <div class="auth-box">
        <div class="big-logo">Smart<span>Split</span> Pro</div>
        <div id="login-view">
            <input type="password" id="pin-input" class="fi" maxlength="4" placeholder="••••" style="text-align:center; font-size:32px; letter-spacing:15px;">
            <button class="btn btn-primary" style="width:100%" onclick="login()">Unlock Trip</button>
            <p style="margin-top:20px; font-size:13px; color:var(--muted); cursor:pointer" onclick="toggleAuth()">Create New Trip</p>
        </div>
        <div id="reg-view" class="hidden">
            <input type="text" id="reg-name" class="fi" placeholder="Trip Destination">
            <input type="password" id="reg-pin" class="fi" maxlength="4" placeholder="Set 4-Digit PIN">
            <input type="number" id="reg-budget" class="fi" placeholder="Total Budget (₹)">
            <button class="btn btn-primary" style="width:100%" onclick="register()">Create & Launch</button>
            <p style="margin-top:20px; font-size:13px; color:var(--muted); cursor:pointer" onclick="toggleAuth()">Back to Login</p>
        </div>
    </div>
</div>

<div id="app" class="hidden">
    <nav class="navbar">
        <div class="nav-logo">Smart<span>Split</span></div>
        <button class="btn btn-primary" onclick="openModal()">＋ Add Spend</button>
    </nav>
    <main class="main">
        <div style="margin-bottom:40px">
            <h1 id="trip-title" style="font-family:var(--font-head); font-size:38px">Dashboard</h1>
            <p id="trip-pin-display" style="color:var(--accent2); font-weight:700; margin-top:5px"></p>
        </div>
        
        <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(280px, 1fr)); gap:20px">
            <div class="stat-card">
                <div class="stat-lbl">Total Spent</div>
                <div id="stat-total" class="stat-val" style="color:var(--accent2)">₹0</div>
            </div>
            <div class="stat-card">
                <div class="stat-lbl">Budget Used</div>
                <div id="stat-budget" class="stat-val">0%</div>
                <div class="prog-track"><div id="budget-bar" class="prog-fill"></div></div>
            </div>
            <div class="stat-card">
                <div class="stat-lbl">Avg / Activity</div>
                <div id="stat-avg" class="stat-val" style="color:var(--green)">₹0</div>
            </div>
        </div>

        <div class="grid-2">
            <div class="card">
                <div class="card-title">Recent Activity 💸</div>
                <div id="exp-list"></div>
            </div>
            <div class="card">
                <div class="card-title">Category Split 📊</div>
                <div id="cat-list"></div>
            </div>
        </div>
    </main>
</div>

<div id="modal" class="modal">
    <div class="auth-box" style="text-align:left">
        <h3 style="margin-bottom:20px">Add Expense</h3>
        <input type="text" id="exp-name" class="fi" placeholder="What did you pay for?">
        <input type="number" id="exp-amt" class="fi" placeholder="Amount (₹)">
        <select id="exp-cat" class="fi">
            <option>🍔 Food</option><option>✈️ Transport</option><option>🏨 Stay</option><option>🎭 Fun</option><option>🛍️ Shopping</option>
        </select>
        <button class="btn btn-primary" style="width:100%" onclick="saveExpense()">Save Expense</button>
        <button class="btn btn-ghost" style="width:100%; margin-top:10px" onclick="closeModal()">Cancel</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, set, push, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const conf = {
    apiKey: "AIzaSyCqb7gAbpa3UabPU3g_YhNITuPWtWPY4KU",
    authDomain: "ak-events-2016.firebaseapp.com",
    databaseURL: "https://ak-events-2016-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "ak-events-2016"
};

const app = initializeApp(conf);
const db = getDatabase(app);
let activeGid = "";
let tripBudget = 0;

window.toggleAuth = () => {
    document.getElementById('login-view').classList.toggle('hidden');
    document.getElementById('reg-view').classList.toggle('hidden');
};

window.login = async () => {
    const pin = document.getElementById('pin-input').value;
    const q = query(ref(db, 'smartsplit/groups'), orderByChild('loginCode'), equalTo(pin));
    const snap = await get(q);
    if(snap.exists()) {
        activeGid = Object.keys(snap.val())[0];
        const data = snap.val()[activeGid];
        tripBudget = data.budget || 0;
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        document.getElementById('app').style.display = "flex";
        document.getElementById('trip-title').innerText = data.name;
        document.getElementById('trip-pin-display').innerText = "TRIP CODE: " + pin;
        loadData();
    } else alert("Wrong PIN");
};

window.register = async () => {
    const name = document.getElementById('reg-name').value;
    const pin = document.getElementById('reg-pin').value;
    const budget = document.getElementById('reg-budget').value;
    if(!name || pin.length !== 4) return alert("Fill correctly");
    const gRef = push(ref(db, 'smartsplit/groups'));
    await set(gRef, { name, loginCode: pin, budget: parseFloat(budget) });
    alert("Trip Created!");
    location.reload();
};

async function loadData() {
    const q = query(ref(db, 'smartsplit/expenses'), orderByChild('groupId'), equalTo(activeGid));
    const snap = await get(q);
    const exps = snap.exists() ? Object.values(snap.val()) : [];
    render(exps);
}

window.openModal = () => document.getElementById('modal').style.display = "flex";
window.closeModal = () => document.getElementById('modal').style.display = "none";

window.saveExpense = async () => {
    const name = document.getElementById('exp-name').value;
    const amt = document.getElementById('exp-amt').value;
    const cat = document.getElementById('exp-cat').value;
    await set(push(ref(db, 'smartsplit/expenses')), { 
        name, amount: parseFloat(amt), category: cat, groupId: activeGid, date: new Date().toLocaleDateString() 
    });
    closeModal();
    loadData();
};

function render(exps) {
    const total = exps.reduce((s,e) => s + e.amount, 0);
    document.getElementById('stat-total').innerText = "₹" + total.toLocaleString();
    document.getElementById('stat-avg').innerText = "₹" + (exps.length ? Math.round(total/exps.length).toLocaleString() : 0);
    
    if(tripBudget) {
        const pct = Math.min(100, Math.round((total/tripBudget)*100));
        document.getElementById('stat-budget').innerText = pct + "%";
        document.getElementById('budget-bar').style.width = pct + "%";
        document.getElementById('budget-bar').style.background = pct > 80 ? 'var(--red)' : 'var(--accent)';
    }

    document.getElementById('exp-list').innerHTML = exps.reverse().map(e => `
        <div class="exp-item">
            <div class="exp-icon">${e.category.split(' ')[0]}</div>
            <div style="flex:1">
                <div style="font-weight:700">${e.name}</div>
                <div style="font-size:12px; color:var(--muted)">${e.category.split(' ')[1]} • ${e.date}</div>
            </div>
            <div style="font-family:var(--font-head); font-weight:700; font-size:18px">₹${e.amount}</div>
        </div>
    `).join('');

    const cats = {};
    exps.forEach(e => cats[e.category] = (cats[e.category] || 0) + e.amount);
    document.getElementById('cat-list').innerHTML = Object.entries(cats).map(([c, v]) => `
        <div style="margin-bottom:15px">
            <div style="display:flex; justify-content:space-between; font-size:13px; margin-bottom:5px">
                <span>${c}</span><span>₹${v}</span>
            </div>
            <div class="prog-track"><div style="width:${(v/total)*100}%; height:100%; background:var(--accent)"></div></div>
        </div>
    `).join('');
}
</script>
</body>
</html>
