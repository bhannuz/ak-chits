<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartSplit Pro | Premium Trip Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050508; --bg2: #0e0e14; --bg3: #16161f; --card: #111118;
  --border: rgba(255,255,255,0.06); --border2: rgba(255,255,255,0.12);
  --text: #f8f9fa; --muted: #94a3b8;
  --accent: #6366f1; --accent2: #818cf8;
  --green: #10b981; --red: #ef4444; --amber: #f59e0b;
  --radius: 20px; --radius-sm: 12px;
  --font-main: 'Plus Jakarta Sans', sans-serif;
  --font-head: 'Space Grotesk', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-main); background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }

/* ─── AUTH SCREENS ─── */
.screen { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; 
  background: radial-gradient(circle at top right, rgba(99, 102, 241, 0.1), transparent), var(--bg); }
.auth-box { background: var(--bg2); border: 1px solid var(--border2); border-radius: 28px; padding: 48px 40px; width: 100%; max-width: 400px; box-shadow: 0 50px 100px -20px rgba(0,0,0,0.5); animation: zoomIn .3s ease; }
@keyframes zoomIn { from { opacity:0; transform: scale(0.95); } to { opacity:1; transform: scale(1); } }

.big-logo { font-family: var(--font-head); font-size: 32px; font-weight: 700; text-align: center; margin-bottom: 4px; letter-spacing: -1px; }
.big-logo span { color: var(--accent); }
.logo-tag { font-size: 12px; color: var(--muted); text-align: center; font-weight: 500; margin-bottom: 40px; text-transform: uppercase; letter-spacing: 1px; }

/* PIN Input Enhancement */
.fi-pin { font-family: var(--font-head); font-size: 42px !important; letter-spacing: 18px !important; text-align: center; border: 2px solid var(--bg3); background: var(--bg); border-radius: 16px; margin-bottom: 20px; }
.fi-pin:focus { border-color: var(--accent); }

/* Buttons Upgrade */
.btn { padding: 14px 24px; border-radius: var(--radius-sm); border: none; cursor: pointer; font-family: var(--font-main); font-size: 14px; font-weight: 700; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); display: inline-flex; align-items: center; gap: 8px; justify-content: center; }
.btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.5); }
.btn-ghost { background: var(--bg3); color: var(--text); }
.btn-sm { padding: 8px 16px; font-size: 12px; border-radius: 10px; }

/* ─── NAVBAR ─── */
.navbar { height: 72px; background: rgba(5, 5, 8, 0.8); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 32px; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(20px); }
.nav-logo { font-family: var(--font-head); font-size: 22px; font-weight: 700; }

/* ─── DASHBOARD ─── */
.main { padding: 32px; max-width: 1200px; margin: 0 auto; }
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 32px; }
@media(max-width: 900px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }

.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 24px; transition: 0.3s; }
.stat-card:hover { border-color: var(--border2); background: var(--bg2); }
.stat-lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; }
.stat-val { font-family: var(--font-head); font-size: 26px; font-weight: 700; margin-top: 8px; }

/* ─── EXPENSES ─── */
.card { background: var(--card); border-radius: 24px; border: 1px solid var(--border); overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
.card-hd { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.01); }
.card-title { font-family: var(--font-head); font-weight: 700; font-size: 16px; }

.exp-item { display: flex; align-items: center; gap: 16px; padding: 18px 24px; border-bottom: 1px solid var(--border); transition: 0.2s; }
.exp-item:hover { background: rgba(255,255,255,0.02); }
.exp-icon { width: 48px; height: 48px; border-radius: 14px; background: linear-gradient(135deg, var(--bg3), var(--bg2)); border: 1px solid var(--border2); display: flex; align-items: center; justify-content: center; font-size: 20px; }
.exp-amt { font-family: var(--font-head); font-size: 17px; font-weight: 700; color: var(--text); }

/* Progress */
.prog-track { height: 6px; background: var(--bg3); border-radius: 10px; margin-top: 12px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 10px; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); background: var(--accent); }

/* Tabs Upgrade */
.tabs { display: flex; gap: 8px; padding: 0 32px; margin-top: 20px; }
.tab { padding: 10px 22px; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; color: var(--muted); transition: 0.2s; }
.tab.active { background: var(--bg2); color: var(--text); border: 1px solid var(--border2); }

.hidden { display: none !important; }
.av-pill { padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; text-transform: uppercase; background: rgba(99, 102, 241, 0.1); color: var(--accent2); }

/* Select boxes */
.fi { border-radius: 12px; background: var(--bg3); border: 1px solid var(--border2); padding: 12px 16px; color: var(--text); font-family: var(--font-main); }
</style>
</head>
<body>

<div id="fb-loader">
  <div class="loader-logo" style="font-family: var(--font-head);">Smart<span>Split</span></div>
  <div style="font-size:12px; color:var(--muted); margin-top:10px;">Initializing Pro Engine...</div>
</div>

<div id="s-join" class="screen hidden">
  <div class="auth-box">
    <div class="big-logo" style="font-family: var(--font-head);">Smart<span>Split</span> Pro</div>
    <div class="logo-tag">Trip Manager</div>
    <div style="text-align:center; margin-bottom:20px;">
      <h3 style="font-family: var(--font-head); font-size: 20px;">Unlock Trip</h3>
      <p style="font-size: 13px; color: var(--muted);">Enter 4-digit PIN</p>
    </div>
    <input class="fi fi-pin" id="j-pin" type="text" maxlength="4" placeholder="0000"
      oninput="this.value=this.value.replace(/\D/g,'').slice(0,4)"
      onkeydown="if(event.key==='Enter') joinTrip()">
    <div class="btn-row">
      <button class="btn btn-primary btn-full" onclick="joinTrip()">Unlock Dashboard →</button>
    </div>
    <div style="margin-top:16px; text-align:center;">
       <button class="btn btn-sm btn-ghost" onclick="goScreen('s-start')">Cancel</button>
    </div>
    <div class="pin-err" id="join-err"></div>
  </div>
</div>

<div id="main-app" class="hidden">
  <nav class="navbar">
    <div class="nav-logo">Smart<span>Split</span></div>
    <div class="nav-right">
      <div class="trip-badge" id="trip-badge" style="border-radius: 12px;">
        <span id="badge-name">...</span>
        <span class="av-pill" id="badge-code">0000</span>
      </div>
      <button class="btn btn-primary btn-sm" onclick="openAddExp()">＋ Add Spend</button>
      <button class="btn btn-ghost btn-sm" style="border-radius: 12px;" onclick="doLogout()">⎋</button>
    </div>
  </nav>

  <div class="tabs">
    <div class="tab active" onclick="switchView('expenses',this)">Expenses</div>
    <div class="tab" onclick="switchView('members',this)">Members</div>
    <div class="tab" onclick="switchView('settle',this)">Settlements</div>
    <div class="tab" onclick="switchView('analytics',this)">Insights</div>
  </div>

  <div class="main">
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-lbl">Total Trip Spend</div>
        <div class="stat-val" id="s-total" style="color: var(--accent2);">₹0</div>
      </div>
      <div class="stat-card">
        <div class="stat-lbl">Budget Health</div>
        <div class="stat-val" id="s-budget-status">Healthy</div>
        <div class="prog-track"><div class="prog-fill" id="s-bprog" style="width:0%"></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-lbl">Active Members</div>
        <div class="stat-val" id="s-mem-count">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-lbl">Pending Debts</div>
        <div class="stat-val" id="s-pend" style="color: var(--amber);">0</div>
      </div>
    </div>

    <div class="view show" id="v-expenses">
      <div class="grid-2">
        <div class="card">
          <div class="card-hd">
            <span class="card-title">Activity Feed</span>
            <select class="fi" id="cat-filter" style="padding: 4px 8px; font-size: 12px;" onchange="renderExpenses()">
              <option value="">All Categories</option>
              <option>🍔 Food</option><option>✈️ Transport</option><option>🏨 Stay</option>
              <option>🎭 Fun</option><option>🛍️ Shopping</option><option>📦 Other</option>
            </select>
          </div>
          <div id="exp-list"></div>
        </div>
        
        <div class="card">
          <div class="card-hd"><span class="card-title">Category Distribution</span></div>
          <div class="card-body" id="cat-chart"></div>
        </div>
      </div>
    </div>
    </div>
</div>

<script type="module">
// ... [Your existing Firebase initialization] ...

// ── ADDED PRO FEATURE: Debt Minimization Engine ──
// This optimizes settlements so fewer payments are made
function getOptimizedSettlements(balances) {
  let debtors = [], creditors = [];
  for(let id in balances) {
    if(balances[id] < -0.01) debtors.push({id, amt: -balances[id]});
    else if(balances[id] > 0.01) creditors.push({id, amt: balances[id]});
  }
  debtors.sort((a,b) => b.amt - a.amt);
  creditors.sort((a,b) => b.amt - a.amt);
  
  let settlements = [];
  while(debtors.length && creditors.length) {
    let d = debtors[0], c = creditors[0];
    let min = Math.min(d.amt, c.amt);
    settlements.push({from: d.id, to: c.id, amt: min});
    d.amt -= min; c.amt -= min;
    if(d.amt <= 0.01) debtors.shift();
    if(c.amt <= 0.01) creditors.shift();
  }
  return settlements;
}

// ... [The rest of your event listeners and render functions] ...
</script>
</body>
</html>
