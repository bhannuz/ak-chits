<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartSplit — Secured Expense Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f13; --bg2: #16161e; --bg3: #1e1e2a; --card: #1a1a24;
            --border: rgba(255,255,255,0.08); --text: #f0f0f5; --muted: #888899;
            --accent: #7c6af5; --accent2: #a594ff; --green: #3ecf8e; --red: #f46f6f;
            --radius: 14px; --radius-sm: 8px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow: hidden; }
        
        /* Login Overlay */
        #login-screen {
            position: fixed; inset: 0; background: var(--bg); z-index: 10000;
            display: flex; align-items: center; justify-content: center;
        }
        .login-box {
            background: var(--bg2); padding: 40px; border-radius: var(--radius);
            border: 1px solid var(--border); text-align: center; width: 320px;
        }

        /* Rest of Styles */
        .app { display: none; height: 100vh; } /* Hidden until login */
        .sidebar { width: 260px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .main { flex: 1; overflow-y: auto; background: var(--bg); }
        .logo { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: var(--text); }
        .logo span { color: var(--accent2); }
        .form-input { width: 100%; padding: 12px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); color: #fff; margin-bottom: 15px; outline: none; }
        .btn { padding: 10px 20px; border-radius: var(--radius-sm); border: none; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: white; width: 100%; }
        .nav-item { padding: 12px 20px; cursor: pointer; color: var(--muted); }
        .nav-item.active { background: rgba(124,106,245,0.1); color: var(--accent2); }
        .group-item { padding: 10px 15px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .group-item.active { background: var(--bg3); }
        .content { padding: 30px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; }
        .expense-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <div class="logo" style="margin-bottom: 30px;">Smart<span>Split</span></div>
        <p style="font-size: 13px; color: var(--muted); margin-bottom: 10px;">Enter 4-Digit Group Code</p>
        <input type="password" id="auth-code" class="form-input" maxlength="4" style="text-align:center; font-size: 24px; letter-spacing: 8px;" placeholder="****">
        <button id="login-btn" class="btn btn-primary">Unlock Dashboard</button>
        <p id="login-err" style="color: var(--red); font-size: 12px; margin-top: 15px; display: none;">Access Denied</p>
    </div>
</div>

<div class="app" id="main-app" style="display: flex;">
    <aside class="sidebar">
        <div style="padding: 24px 20px;"><div class="logo">Smart<span>Split</span></div></div>
        <div class="nav-item active">Dashboard</div>
        <div style="padding: 15px 20px; font-size: 11px; color: var(--muted); text-transform: uppercase;">Your Groups</div>
        <div id="sidebar-groups"></div>
    </aside>

    <main class="main">
        <div class="content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <h1 id="view-title" style="font-family: 'Syne';">Overview</h1>
                <button class="btn btn-primary" style="width: auto;" onclick="alert('Add Functionality here')">+ Add Expense</button>
            </div>

            <div id="expense-container">
                <div class="card">
                    <h3 style="font-family: 'Syne'; margin-bottom: 15px;">Recent Expenses</h3>
                    <div id="expense-list"></div>
                </div>
            </div>
        </div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, get, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCqb7gAbpa3UabPU3g_YhNITuPWtWPY4KU",
        authDomain: "ak-events-2016.firebaseapp.com",
        databaseURL: "https://ak-events-2016-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ak-events-2016",
        storageBucket: "ak-events-2016.firebasestorage.app",
        messagingSenderId: "78066764444",
        appId: "1:78066764444:web:d5ff1b1ea4c2a19932fb59"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let state = { groups: {}, expenses: [], currentUserRole: 'user' };

    // --- LOGIN LOGIC ---
    document.getElementById('login-btn').addEventListener('click', async () => {
        const code = document.getElementById('auth-code').value;
        const err = document.getElementById('login-err');
        
        if (code === "8888") {
            // ADMIN PATH: Logic to fetch everything (requires rules for query.equalTo === '8888')
            await loadData(code, true);
        } else {
            // USER PATH: Fetch only their group
            await loadData(code, false);
        }
    });

    async function loadData(code, isAdmin) {
        const groupsRef = ref(db, 'smartsplit/groups');
        // This query is REQUIRED by your security rules
        const groupQuery = isAdmin ? query(groupsRef) : query(groupsRef, orderByChild('loginCode'), equalTo(code));

        try {
            const snapshot = await get(groupQuery);
            if (snapshot.exists()) {
                state.groups = snapshot.val();
                
                // Fetch expenses for the first group found
                const firstGroupId = Object.keys(state.groups)[0];
                await loadExpenses(firstGroupId, code);
                
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
                renderUI();
            } else {
                throw new Error("No access");
            }
        } catch (e) {
            document.getElementById('login-err').style.display = 'block';
            console.error(e);
        }
    }

    async function loadExpenses(groupId, code) {
        const expRef = ref(db, 'smartsplit/expenses');
        // Again, query for specific group as per rules
        const expQuery = query(expRef, orderByChild('groupId'), equalTo(groupId));
        
        // Note: In rules, reading expenses also checks the loginCode of the parent group
        const snapshot = await get(expQuery);
        state.expenses = snapshot.exists() ? Object.values(snapshot.val()) : [];
    }

    // --- RENDER LOGIC ---
    function renderUI() {
        const groupList = document.getElementById('sidebar-groups');
        groupList.innerHTML = Object.values(state.groups).map(g => `
            <div class="group-item">
                <div style="width:10px; height:10px; border-radius:50%; background:var(--accent);"></div>
                ${g.name}
            </div>
        `).join('');

        const expList = document.getElementById('expense-list');
        if (state.expenses.length === 0) {
            expList.innerHTML = "<p style='color:var(--muted)'>No expenses found for this group.</p>";
        } else {
            expList.innerHTML = state.expenses.map(e => `
                <div class="expense-item">
                    <span>${e.name}</span>
                    <span style="font-weight:bold; color:var(--accent2)">₹${e.amount}</span>
                </div>
            `).join('');
        }
    }
</script>

</body>
</html>
