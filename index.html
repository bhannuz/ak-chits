<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartSplit — Team Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f13; --bg2: #16161e; --bg3: #1e1e2a; --card: #1a1a24;
            --border: rgba(255,255,255,0.08); --text: #f0f0f5; --muted: #888899;
            --accent: #7c6af5; --accent2: #a594ff; --radius: 14px; --radius-sm: 8px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
        
        .auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: var(--bg2); padding: 40px; border-radius: var(--radius); border: 1px solid var(--border); text-align: center; width: 340px; }
        
        .app { display: none; height: 100vh; }
        .sidebar { width: 260px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .main { flex: 1; overflow-y: auto; padding: 30px; }
        
        .logo { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: var(--text); margin-bottom: 20px; }
        .logo span { color: var(--accent2); }
        .form-input { width: 100%; padding: 12px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); color: #fff; margin-bottom: 12px; outline: none; text-align: center; }
        .btn { padding: 12px; border-radius: var(--radius-sm); border: none; cursor: pointer; font-weight: 600; width: 100%; margin-top: 10px; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="start-screen" class="auth-overlay">
    <div class="auth-box">
        <div class="logo">Smart<span>Split</span></div>
        <button class="btn btn-primary" onclick="showScreen('login-screen')">Login with Code</button>
        <button class="btn btn-ghost" onclick="showScreen('reg-screen')">Create New Group</button>
    </div>
</div>

<div id="login-screen" class="auth-overlay hidden">
    <div class="auth-box">
        <h3>Login</h3>
        <p style="color:var(--muted); font-size:12px; margin: 10px 0;">Enter your 4-digit code</p>
        <input type="password" id="l-code" class="form-input" maxlength="4" style="letter-spacing:8px; font-size:20px;">
        <button class="btn btn-primary" id="do-login">Unlock</button>
        <button class="btn btn-ghost" onclick="showScreen('start-screen')">Back</button>
    </div>
</div>

<div id="reg-screen" class="auth-overlay hidden">
    <div class="auth-box">
        <h3>New Code</h3>
        <p style="color:var(--muted); font-size:12px; margin: 10px 0;">Pick a 4-digit code for your group</p>
        <input type="password" id="r-code" class="form-input" maxlength="4" style="letter-spacing:8px; font-size:20px;">
        <button class="btn btn-primary" id="reg-next">Continue</button>
        <button class="btn btn-ghost" onclick="showScreen('start-screen')">Back</button>
    </div>
</div>

<div id="setup-screen" class="auth-overlay hidden">
    <div class="auth-box">
        <h3>Finalize Setup</h3>
        <input type="text" id="s-group" class="form-input" placeholder="Group Name" style="text-align:left">
        <input type="text" id="s-user" class="form-input" placeholder="Your Name" style="text-align:left">
        <button class="btn btn-primary" id="finish-setup">Create & Launch</button>
    </div>
</div>

<div id="main-app" class="app">
    <aside class="sidebar">
        <div style="padding: 24px 20px;"><div class="logo">Smart<span>Split</span></div></div>
        <div id="sidebar-groups" style="padding: 10px 20px;"></div>
    </aside>
    <main class="main">
        <h1 id="active-title" style="font-family: 'Syne';">Dashboard</h1>
        <div class="card" style="margin-top:20px">
            <div id="exp-list">Select a group to see expenses</div>
        </div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, get, set, push, query, orderByChild, equalTo, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCqb7gAbpa3UabPU3g_YhNITuPWtWPY4KU",
        authDomain: "ak-events-2016.firebaseapp.com",
        databaseURL: "https://ak-events-2016-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ak-events-2016",
        storageBucket: "ak-events-2016.firebasestorage.app",
        messagingSenderId: "78066764444",
        appId: "1:78066764444:web:d5ff1b1ea4c2a19932fb59"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let currentCode = "";

    window.showScreen = (id) => {
        document.querySelectorAll('.auth-overlay').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    };

    // LOGIN
    document.getElementById('do-login').onclick = () => attemptLoad(document.getElementById('l-code').value);

    // REGISTER STEP 1
    document.getElementById('reg-next').onclick = async () => {
        const code = document.getElementById('r-code').value;
        if(code.length !== 4) return alert("Enter 4 digits");
        
        // Check if code exists
        const q = query(ref(db, 'smartsplit/groups'), orderByChild('loginCode'), equalTo(code));
        const snap = await get(q);
        if(snap.exists()) return alert("Code taken. Try another.");
        
        currentCode = code;
        showScreen('setup-screen');
    };

    // FINAL SETUP
    document.getElementById('finish-setup').onclick = async () => {
        const gName = document.getElementById('s-group').value;
        const uName = document.getElementById('s-user').value;
        if(!gName || !uName) return alert("Fill all fields");

        const gRef = push(ref(db, 'smartsplit/groups'));
        const gId = gRef.key;

        const updates = {};
        updates[`smartsplit/groups/${gId}`] = { name: gName, loginCode: currentCode, id: Date.now() };
        updates[`smartsplit/members/${push(ref(db, 'smartsplit/members')).key}`] = { name: uName, groupId: gId, role: 'Owner' };

        try {
            await update(ref(db), updates);
            alert("Group Created!");
            attemptLoad(currentCode);
        } catch (e) {
            console.error(e);
            alert("Rule Error: Check console and click the Indexing link if visible.");
        }
    };

    async function attemptLoad(code) {
        const q = query(ref(db, 'smartsplit/groups'), orderByChild('loginCode'), equalTo(code));
        try {
            const snap = await get(q);
            if(snap.exists()) {
                const groups = snap.val();
                const gId = Object.keys(groups)[0];
                
                document.querySelectorAll('.auth-overlay').forEach(s => s.classList.add('hidden'));
                document.getElementById('main-app').style.display = 'flex';
                
                document.getElementById('active-title').innerText = groups[gId].name;
                document.getElementById('sidebar-groups').innerHTML = `<div style="background:var(--bg3); padding:10px; border-radius:5px;">${groups[gId].name}</div>`;
            } else {
                alert("Invalid Code");
            }
        } catch (e) {
            console.error(e);
            alert("Access Denied: Please check your Database Rules.");
        }
    }
</script>
</body>
</html>
