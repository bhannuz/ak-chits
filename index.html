<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartSplit Pro — Travel Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0b0f; --bg2: #12121a; --bg3: #1c1c27; --card: #161620;
            --border: rgba(255,255,255,0.07); --text: #f0f0f5; --muted: #888899;
            --accent: #7c6af5; --accent2: #a594ff; --green: #3ecf8e; --red: #f46f6f;
            --radius: 16px; --radius-sm: 10px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

        .auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-box { background: var(--bg2); padding: 36px; border-radius: var(--radius); border: 1px solid var(--border); text-align: center; width: 100%; max-width: 360px; box-shadow: 0 24px 48px rgba(0,0,0,0.5); }
        .hidden { display: none !important; }

        .app { display: none; height: 100vh; flex-direction: column; }
        .navbar { height: 68px; background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 28px; flex-shrink: 0; }
        .main { flex: 1; overflow-y: auto; padding: 28px; max-width: 1200px; margin: 0 auto; width: 100%; }

        .logo { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; letter-spacing: -1px; }
        .logo span { color: var(--accent2); }
        .form-input { width: 100%; padding: 13px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); margin-bottom: 12px; outline: none; font-size: 15px; }
        
        .btn { padding: 12px 22px; border-radius: var(--radius-sm); border: none; cursor: pointer; font-weight: 700; transition: all 0.2s; font-family: 'Syne'; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }

        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 24px; }
        .stat-card { background: var(--card); padding: 22px; border-radius: var(--radius); border: 1px solid var(--border); }
        .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; font-weight: 700; }
        .stat-val { font-family: 'Syne'; font-size: 28px; margin-top: 8px; font-weight: 800; }

        .expense-item { display: flex; align-items: center; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--border); }
        .cat-icon { width: 44px; height: 44px; border-radius: 12px; background: var(--bg3); display: flex; align-items: center; justify-content: center; font-size: 20px; }
        
        /* Modal Style */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 20000; display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); }
        .modal-box { background: var(--bg2); padding: 30px; border-radius: 16px; border: 1px solid var(--border); width: 100%; max-width: 400px; }
    </style>
</head>
<body>

<div id="start-screen" class="auth-overlay">
    <div class="auth-box">
        <div class="logo" style="margin-bottom:30px">Smart<span>Split</span></div>
        <button class="btn btn-primary" style="width:100%" onclick="showScreen('login-screen')">Login with Code</button>
        <button class="btn btn-ghost" style="width:100%; margin-top:12px" onclick="showScreen('reg-screen')">New Trip</button>
    </div>
</div>

<div id="login-screen" class="auth-overlay hidden">
    <div class="auth-box">
        <h3>Trip Access</h3>
        <input type="password" id="l-code" class="form-input" maxlength="4" placeholder="••••" style="letter-spacing:12px; font-size:26px; text-align:center; margin-top:20px;">
        <button class="btn btn-primary" style="width:100%" id="do-login">Unlock Trip</button>
        <button class="btn btn-ghost" style="width:100%; margin-top:12px" onclick="showScreen('start-screen')">Back</button>
        <p id="login-err" style="color:var(--red); font-size:12px; margin-top:10px; display:none;"></p>
    </div>
</div>

<div id="reg-screen" class="auth-overlay hidden">
    <div class="auth-box">
        <h3>Pick a 4-Digit Code</h3>
        <input type="password" id="r-code" class="form-input" maxlength="4" style="letter-spacing:12px; font-size:26px; text-align:center; margin-top:20px;">
        <button class="btn btn-primary" style="width:100%" id="reg-next">Continue</button>
        <button class="btn btn-ghost" style="width:100%; margin-top:12px" onclick="showScreen('start-screen')">Back</button>
    </div>
</div>

<div id="setup-screen" class="auth-overlay hidden">
    <div class="auth-box">
        <h3>Trip Setup</h3>
        <input type="text" id="s-group" class="form-input" placeholder="Trip Name (e.g. Char Dham)">
        <button class="btn btn-primary" style="width:100%" id="finish-setup">Create Trip</button>
    </div>
</div>

<div id="main-app" class="app">
    <nav class="navbar">
        <div class="logo">Smart<span>Split</span></div>
        <button class="btn btn-primary" onclick="openAddExpense()">＋ Add Spend</button>
    </nav>
    <main class="main">
        <div style="margin-bottom: 24px;">
            <h1 id="active-title" style="font-family: 'Syne'; font-size: 32px;">Dashboard</h1>
            <p id="group-code-display" style="color:var(--accent2); font-weight:700; font-size:13px; margin-top:6px;"></p>
        </div>
        <div class="grid-3">
            <div class="stat-card" style="background: var(--accent);">
                <div class="stat-label" style="color:white">Total Trip Spend</div>
                <div class="stat-val" id="stat-total" style="color:white">₹0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Daily Average</div>
                <div class="stat-val" style="color:var(--green)" id="stat-avg">₹0</div>
            </div>
        </div>
        <div class="stat-card">
            <h3 style="font-family: 'Syne'; margin-bottom:15px;">Recent Activity</h3>
            <div id="exp-list">No expenses logged yet.</div>
        </div>
    </main>
</div>

<div id="expense-modal" class="modal">
    <div class="modal-box">
        <h3 style="font-family:'Syne'; margin-bottom:20px;">💸 Add New Spend</h3>
        <input type="text" id="new-exp-name" class="form-input" placeholder="Description">
        <input type="number" id="new-exp-amt" class="form-input" placeholder="Amount (₹)">
        <select id="new-exp-cat" class="form-input">
            <option>🍔 Food</option><option>✈️ Transport</option><option>🏨 Stay</option><option>🎭 Fun</option><option>📦 Other</option>
        </select>
        <div style="display:flex; gap:10px;">
            <button class="btn btn-primary" style="flex:1" id="save-expense">Save</button>
            <button class="btn btn-ghost" onclick="document.getElementById('expense-modal').style.display='none'">Cancel</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, get, query, orderByChild, equalTo, set, push, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCqb7gAbpa3UabPU3g_YhNITuPWtWPY4KU",
        authDomain: "ak-events-2016.firebaseapp.com",
        databaseURL: "https://ak-events-2016-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ak-events-2016",
        storageBucket: "ak-events-2016.firebasestorage.app",
        messagingSenderId: "78066764444",
        appId: "1:78066764444:web:d5ff1b1ea4c2a19932fb59"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let activeGid = "";
    let tempCode = "";

    window.showScreen = (id) => {
        document.querySelectorAll('.auth-overlay').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    };

    window.openAddExpense = () => document.getElementById('expense-modal').style.display = 'flex';

    // LOGIN
    document.getElementById('do-login').onclick = () => attemptLoad(document.getElementById('l-code').value);

    // REGISTER
    document.getElementById('reg-next').onclick = async () => {
        const code = document.getElementById('r-code').value;
        if(code.length !== 4) return alert("Pick 4 digits");
        const q = query(ref(db, 'smartsplit/groups'), orderByChild('loginCode'), equalTo(code));
        const snap = await get(q);
        if(snap.exists()) return alert("Code taken!");
        tempCode = code;
        showScreen('setup-screen');
    };

    document.getElementById('finish-setup').onclick = async () => {
        const name = document.getElementById('s-group').value;
        if(!name) return alert("Enter Trip Name");
        const gRef = push(ref(db, 'smartsplit/groups'));
        activeGid = gRef.key;
        await set(gRef, { name, loginCode: tempCode, id: Date.now() });
        attemptLoad(tempCode);
    };

    // LOAD DATA
    async function attemptLoad(code) {
        const q = query(ref(db, 'smartsplit/groups'), orderByChild('loginCode'), equalTo(code));
        try {
            const snap = await get(q);
            if(snap.exists()) {
                const data = snap.val();
                activeGid = Object.keys(data)[0];
                const group = data[activeGid];
                
                document.querySelectorAll('.auth-overlay').forEach(s => s.classList.add('hidden'));
                document.getElementById('main-app').style.display = 'flex';
                document.getElementById('active-title').innerText = group.name;
                document.getElementById('group-code-display').innerText = "TRIP CODE: " + group.loginCode;
                loadExpenses(activeGid);
            } else { alert("Invalid Code"); }
        } catch (e) { console.error(e); alert("Permission Denied: Check Firebase Rules/Indexing."); }
    }

    async function loadExpenses(gid) {
        const q = query(ref(db, 'smartsplit/expenses'), orderByChild('groupId'), equalTo(gid));
        const snap = await get(q);
        const list = document.getElementById('exp-list');
        const expenses = snap.exists() ? Object.values(snap.val()) : [];
        
        const total = expenses.reduce((s, e) => s + e.amount, 0);
        document.getElementById('stat-total').innerText = "₹" + total.toLocaleString();
        
        if(expenses.length === 0) {
            list.innerHTML = "<p style='color:var(--muted)'>No expenses yet.</p>";
        } else {
            list.innerHTML = expenses.reverse().map(e => `
                <div class="expense-item">
                    <div style="flex:1">
                        <div style="font-weight:700">${e.name}</div>
                        <div style="font-size:11px; color:var(--muted)">${e.category} • ${e.date}</div>
                    </div>
                    <div style="font-weight:800; color:var(--accent2)">₹${e.amount}</div>
                </div>
            `).join('');
        }
    }

    // SAVE EXPENSE
    document.getElementById('save-expense').onclick = async () => {
        const name = document.getElementById('new-exp-name').value;
        const amt = parseFloat(document.getElementById('new-exp-amt').value);
        const cat = document.getElementById('new-exp-cat').value;
        if(!name || isNaN(amt)) return alert("Fill all fields");

        const expRef = push(ref(db, 'smartsplit/expenses'));
        await set(expRef, { name, amount: amt, category: cat, groupId: activeGid, date: new Date().toLocaleDateString() });
        
        document.getElementById('expense-modal').style.display = 'none';
        loadExpenses(activeGid);
    };
</script>
</body>
</html>
