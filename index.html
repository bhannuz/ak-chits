<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartSplit Pro — Travel Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* Keeping your existing styles for consistency */
        :root {
            --bg: #0b0b0f; --bg2: #12121a; --bg3: #1c1c27; --card: #161620;
            --border: rgba(255,255,255,0.07); --text: #f0f0f5; --muted: #888899;
            --accent: #7c6af5; --accent2: #a594ff; --green: #3ecf8e; --red: #f46f6f;
            --radius: 16px; --radius-sm: 10px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-box { background: var(--bg2); padding: 36px; border-radius: var(--radius); border: 1px solid var(--border); text-align: center; width: 100%; max-width: 360px; }
        .hidden { display: none !important; }
        .app { display: none; height: 100vh; flex-direction: column; }
        .navbar { height: 68px; background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 28px; }
        .main { flex: 1; overflow-y: auto; padding: 28px; max-width: 1200px; margin: 0 auto; width: 100%; }
        .logo { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; letter-spacing: -1px; }
        .logo span { color: var(--accent2); }
        .form-input { width: 100%; padding: 13px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); margin-bottom: 12px; outline: none; }
        .btn { padding: 12px 22px; border-radius: var(--radius-sm); border: none; cursor: pointer; font-weight: 700; font-family: 'Syne'; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 24px; }
        .stat-card { background: var(--card); padding: 22px; border-radius: var(--radius); border: 1px solid var(--border); }
        .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; font-weight: 700; }
        .stat-val { font-family: 'Syne'; font-size: 28px; margin-top: 8px; font-weight: 800; }
        .expense-item { display: flex; align-items: center; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>

<div id="login-screen" class="auth-overlay">
    <div class="auth-box">
        <div class="logo" style="margin-bottom:20px">Smart<span>Split</span></div>
        <h3 style="margin-bottom:8px">Trip Access</h3>
        <p style="color:var(--muted); font-size:13px; margin-bottom:24px">Enter your 4-digit trip code</p>
        <input type="password" id="l-code" class="form-input" maxlength="4" placeholder="••••" style="letter-spacing:12px; font-size:26px; text-align:center;">
        <button class="btn btn-primary" style="width:100%" id="do-login">Unlock Trip →</button>
        <div id="login-err" style="color:var(--red); font-size:13px; margin-top:12px; display:none;"></div>
    </div>
</div>

<div id="main-app" class="app">
    <nav class="navbar">
        <div class="logo">Smart<span>Split</span></div>
        <button class="btn btn-primary" onclick="alert('Add Function Coming Soon')">＋ Add Spend</button>
    </nav>
    <main class="main">
        <div style="margin-bottom: 24px;">
            <h1 id="active-title" style="font-family: 'Syne'; font-size: 32px;">Trip Dashboard</h1>
            <p id="group-code-display" style="color:var(--accent2); font-weight:700; font-size:13px; margin-top:6px;"></p>
        </div>
        <div class="grid-3">
            <div class="stat-card" style="background: var(--accent);">
                <div class="stat-label" style="color:white">Total Spend</div>
                <div class="stat-val" id="stat-total" style="color:white">₹0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Budget Remaining</div>
                <div class="stat-val" style="color:var(--green)" id="stat-budget">₹0</div>
            </div>
        </div>
        <div id="exp-list" class="stat-card">
            <p style="color:var(--muted)">Loading expenses...</p>
        </div>
    </main>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyCqb7gAbpa3UabPU3g_YhNITuPWtWPY4KU",
    authDomain: "ak-events-2016.firebaseapp.com",
    databaseURL: "https://ak-events-2016-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "ak-events-2016",
    storageBucket: "ak-events-2016.firebasestorage.app",
    messagingSenderId: "78066764444",
    appId: "1:78066764444:web:d5ff1b1ea4c2a19932fb59"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// LOGIN LOGIC
document.getElementById('do-login').onclick = async () => {
    const code = document.getElementById('l-code').value.trim();
    const errEl = document.getElementById('login-err');
    errEl.style.display = 'none';

    if (code.length !== 4) {
        errEl.innerText = "Enter 4 digits";
        errEl.style.display = "block";
        return;
    }

    try {
        const groupsRef = ref(db, 'smartsplit/groups');
        // SECURE QUERY: Must match your Firebase Rules
        const q = query(groupsRef, orderByChild('loginCode'), equalTo(code));
        const snap = await get(q);

        if (snap.exists()) {
            const groupsData = snap.val();
            const gId = Object.keys(groupsData)[0];
            const group = groupsData[gId];

            // Setup Dashboard
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').style.display = 'flex';
            document.getElementById('active-title').innerText = group.name;
            document.getElementById('group-code-display').innerText = "TRIP CODE: " + group.loginCode;

            // Load Expenses for this group
            loadExpenses(gId);
        } else {
            errEl.innerText = "Invalid Trip Code";
            errEl.style.display = "block";
        }
    } catch (e) {
        console.error(e);
        errEl.innerText = "Permission Denied. Click 'Inspect' -> 'Console' for the Index Link.";
        errEl.style.display = "block";
    }
};

async function loadExpenses(gId) {
    const expRef = ref(db, 'smartsplit/expenses');
    const q = query(expRef, orderByChild('groupId'), equalTo(gId));
    const snap = await get(q);
    
    const list = document.getElementById('exp-list');
    if (snap.exists()) {
        const expenses = Object.values(snap.val());
        const total = expenses.reduce((s, e) => s + e.amount, 0);
        document.getElementById('stat-total').innerText = "₹" + total.toLocaleString();
        
        list.innerHTML = expenses.map(e => `
            <div class="expense-item">
                <div style="flex:1">
                    <div style="font-weight:700">${e.name}</div>
                    <div style="font-size:11px; color:var(--muted)">${e.category}</div>
                </div>
                <div style="font-weight:800; color:var(--accent2)">₹${e.amount}</div>
            </div>
        `).join('');
    } else {
        list.innerHTML = "<p style='color:var(--muted)'>No expenses yet.</p>";
    }
}
</script>
</body>
</html>
