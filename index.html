<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartSplit Pro | Premium Travel Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0b0f; --bg2: #12121a; --bg3: #1c1c27; --card: #161620;
            --border: rgba(255,255,255,0.08); --text: #f0f0f5; --muted: #888899;
            --accent: #7c6af5; --accent2: #a594ff; --green: #3ecf8e; --red: #f46f6f;
            --radius: 18px; --radius-sm: 10px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

        /* Navigation */
        .navbar { height: 75px; background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
        .logo { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; letter-spacing: -1px; }
        .logo span { color: var(--accent2); }

        /* Layout */
        .main { padding: 40px; max-width: 1300px; margin: 0 auto; width: 100%; }
        .grid-main { display: grid; grid-template-columns: 1fr 360px; gap: 30px; margin-top: 30px; }
        @media (max-width: 1000px) { .grid-main { grid-template-columns: 1fr; } }

        /* Stat Cards */
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; }
        .stat-card { background: var(--card); padding: 30px; border-radius: var(--radius); border: 1px solid var(--border); transition: transform 0.3s; }
        .stat-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 800; }
        .stat-val { font-family: 'Syne'; font-size: 36px; margin-top: 12px; font-weight: 800; }

        /* Expenses */
        .card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 28px; height: 100%; }
        .expense-item { display: flex; align-items: center; gap: 20px; padding: 20px 0; border-bottom: 1px solid var(--border); }
        .cat-icon { width: 52px; height: 52px; border-radius: 16px; background: var(--bg3); display: flex; align-items: center; justify-content: center; font-size: 24px; }
        
        /* Auth & Modals */
        .auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-box { background: var(--bg2); padding: 45px; border-radius: var(--radius); border: 1px solid var(--border); text-align: center; width: 100%; max-width: 380px; box-shadow: 0 30px 60px rgba(0,0,0,0.6); }
        .btn { padding: 14px 28px; border-radius: var(--radius-sm); border: none; cursor: pointer; font-weight: 700; font-family: 'Syne'; transition: 0.3s; display: inline-flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-primary { background: var(--accent); color: white; box-shadow: 0 6px 20px rgba(124,106,245,0.4); }
        .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .form-input { width: 100%; padding: 15px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); color: #fff; margin-bottom: 15px; outline: none; font-size: 16px; }
        .hidden { display: none !important; }

        /* Progress Bars */
        .progress-track { height: 6px; background: var(--bg3); border-radius: 10px; margin-top: 8px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); border-radius: 10px; transition: width 0.6s ease; }
    </style>
</head>
<body>

<div id="start-screen" class="auth-overlay">
    <div class="auth-box">
        <div class="logo" style="font-size:36px; margin-bottom:40px;">Smart<span>Split</span></div>
        <button class="btn btn-primary" style="width:100%" onclick="showScreen('login-screen')">Join with Trip Code</button>
        <button class="btn btn-ghost" style="width:100%; margin-top:15px" onclick="showScreen('reg-screen')">Start New Trip</button>
    </div>
</div>

<div id="login-screen" class="auth-overlay hidden">
    <div class="auth-box">
        <h3>Trip Access</h3>
        <input type="password" id="l-code" class="form-input" maxlength="4" placeholder="••••" style="letter-spacing:15px; font-size:30px; text-align:center; margin-top:25px;">
        <button class="btn btn-primary" style="width:100%" id="do-login">Unlock Dashboard</button>
        <button class="btn btn-ghost" style="width:100%; margin-top:15px" onclick="showScreen('start-screen')">Back</button>
    </div>
</div>

<div id="reg-screen" class="auth-overlay hidden">
    <div class="auth-box">
        <h3>Set Trip Code</h3>
        <input type="password" id="r-code" class="form-input" maxlength="4" style="letter-spacing:15px; font-size:30px; text-align:center; margin-top:25px;">
        <button class="btn btn-primary" style="width:100%" id="reg-next">Next: Setup Trip</button>
        <button class="btn btn-ghost" style="width:100%; margin-top:15px" onclick="showScreen('start-screen')">Back</button>
    </div>
</div>

<div id="setup-screen" class="auth-overlay hidden">
    <div class="auth-box">
        <h3>Destination Details</h3>
        <input type="text" id="s-group" class="form-input" placeholder="e.g. Switzerland 2026">
        <input type="number" id="s-budget" class="form-input" placeholder="Total Budget (₹)">
        <button class="btn btn-primary" style="width:100%" id="finish-setup">Launch Trip</button>
    </div>
</div>

<div id="main-app" style="display:none; flex-direction:column;">
    <nav class="navbar">
        <div class="logo">Smart<span>Split</span></div>
        <button class="btn btn-primary" style="padding: 10px 20px; font-size: 14px;" onclick="document.getElementById('exp-modal').style.display='flex'">＋ Add Expense</button>
    </nav>
    <main class="main">
        <div style="margin-bottom: 40px;">
            <h1 id="active-title" style="font-family: 'Syne'; font-size: 42px; letter-spacing: -2px;">Trip Dashboard</h1>
            <p id="group-code-display" style="color:var(--accent2); font-weight:700; letter-spacing:1px; margin-top:10px;"></p>
        </div>

        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-label">Total Spend</div>
                <div class="stat-val" id="stat-total" style="color:var(--accent2);">₹0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Daily Average</div>
                <div class="stat-val" id="stat-avg" style="color:var(--green);">₹0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Budget Remaining</div>
                <div class="stat-val" id="stat-budget">₹0</div>
                <div class="progress-track"><div id="budget-bar" class="progress-fill" style="width:100%"></div></div>
            </div>
        </div>

        <div class="grid-main">
            <div class="card">
                <h3 style="font-family: 'Syne'; margin-bottom: 25px;">Recent Activities</h3>
                <div id="exp-list"></div>
            </div>
            <div style="display: flex; flex-direction: column; gap: 24px;">
                <div class="card">
                    <h3 style="font-family: 'Syne'; margin-bottom: 20px;">By Category</h3>
                    <div id="cat-breakdown"></div>
                </div>
            </div>
        </div>
    </main>
</div>

<div id="exp-modal" class="auth-overlay hidden" style="background:rgba(0,0,0,0.9); backdrop-filter:blur(10px);">
    <div class="auth-box" style="max-width:440px; text-align:left;">
        <h3 style="font-family:'Syne'; margin-bottom:25px;">New Expense</h3>
        <label class="stat-label">Description</label>
        <input type="text" id="n-name" class="form-input" placeholder="Lunch at Zurich Central">
        <label class="stat-label">Amount (₹)</label>
        <input type="number" id="n-amt" class="form-input" placeholder="0.00">
        <label class="stat-label">Category</label>
        <select id="n-cat" class="form-input">
            <option value="🍔 Food">🍔 Food & Drinks</option>
            <option value="✈️ Transport">✈️ Transport</option>
            <option value="🏨 Stay">🏨 Hotel/Stay</option>
            <option value="🎭 Fun">🎭 Fun & Tours</option>
            <option value="🛍️ Shopping">🛍️ Shopping</option>
        </select>
        <div style="display:flex; gap:15px; margin-top:15px;">
            <button class="btn btn-primary" style="flex:1" id="save-exp">Save Expense</button>
            <button class="btn btn-ghost" onclick="document.getElementById('exp-modal').style.display='none'">Cancel</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, get, query, orderByChild, equalTo, set, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCqb7gAbpa3UabPU3g_YhNITuPWtWPY4KU",
        authDomain: "ak-events-2016.firebaseapp.com",
        databaseURL: "https://ak-events-2016-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ak-events-2016",
        storageBucket: "ak-events-2016.firebasestorage.app",
        messagingSenderId: "78066764444",
        appId: "1:78066764444:web:d5ff1b1ea4c2a19932fb59"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let activeGid = "";
    let budget = 0;
    let tempCode = "";

    window.showScreen = (id) => {
        document.querySelectorAll('.auth-overlay').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    };

    // AUTH ACTIONS
    document.getElementById('do-login').onclick = () => attemptLoad(document.getElementById('l-code').value);

    document.getElementById('reg-next').onclick = () => {
        const c = document.getElementById('r-code').value;
        if(c.length !== 4) return alert("Select 4 digits");
        tempCode = c;
        showScreen('setup-screen');
    };

    document.getElementById('finish-setup').onclick = async () => {
        const name = document.getElementById('s-group').value;
        const b = parseFloat(document.getElementById('s-budget').value) || 0;
        if(!name) return alert("Name required");
        const gRef = push(ref(db, 'smartsplit/groups'));
        activeGid = gRef.key;
        await set(gRef, { name, loginCode: tempCode, budget: b });
        attemptLoad(tempCode);
    };

    async function attemptLoad(code) {
        const q = query(ref(db, 'smartsplit/groups'), orderByChild('loginCode'), equalTo(code));
        const snap = await get(q);
        if(snap.exists()) {
            const data = snap.val();
            activeGid = Object.keys(data)[0];
            budget = data[activeGid].budget || 0;
            document.querySelectorAll('.auth-overlay').forEach(s => s.classList.add('hidden'));
            document.getElementById('main-app').style.display = 'flex';
            document.getElementById('active-title').innerText = data[activeGid].name;
            document.getElementById('group-code-display').innerText = "TRIP CODE: " + code;
            loadData();
        } else alert("Invalid Code");
    }

    async function loadData() {
        const q = query(ref(db, 'smartsplit/expenses'), orderByChild('groupId'), equalTo(activeGid));
        const snap = await get(q);
        renderUI(snap.exists() ? Object.values(snap.val()) : []);
    }

    document.getElementById('save-exp').onclick = async () => {
        const name = document.getElementById('n-name').value;
        const amt = parseFloat(document.getElementById('n-amt').value);
        const cat = document.getElementById('n-cat').value;
        if(!name || !amt) return;
        await set(push(ref(db, 'smartsplit/expenses')), { name, amount: amt, category: cat, groupId: activeGid, date: new Date().toLocaleDateString() });
        document.getElementById('exp-modal').style.display = 'none';
        loadData();
    };

    function renderUI(exps) {
        const total = exps.reduce((s, e) => s + e.amount, 0);
        document.getElementById('stat-total').innerText = "₹" + total.toLocaleString();
        document.getElementById('stat-avg').innerText = "₹" + (exps.length ? Math.round(total/exps.length).toLocaleString() : 0);
        
        if(budget) {
            const rem = budget - total;
            document.getElementById('stat-budget').innerText = "₹" + Math.max(0, rem).toLocaleString();
            document.getElementById('budget-bar').style.width = Math.max(0, (rem/budget)*100) + "%";
        }

        document.getElementById('exp-list').innerHTML = exps.reverse().map(e => `
            <div class="expense-item">
                <div class="cat-icon">${e.category.split(' ')[0]}</div>
                <div style="flex:1">
                    <div style="font-weight:700">${e.name}</div>
                    <div style="font-size:12px; color:var(--muted)">${e.category.split(' ')[1]} • ${e.date}</div>
                </div>
                <div style="font-family:Syne; font-weight:800; color:var(--accent2); font-size:20px">₹${e.amount}</div>
            </div>
        `).join('');

        const cats = {};
        exps.forEach(e => cats[e.category] = (cats[e.category] || 0) + e.amount);
        document.getElementById('cat-breakdown').innerHTML = Object.entries(cats).map(([c, v]) => `
            <div style="margin-bottom:20px">
                <div style="display:flex; justify-content:space-between; font-size:13px; margin-bottom:8px">
                    <span>${c}</span><span style="font-weight:700">₹${v}</span>
                </div>
                <div class="progress-track"><div style="width:${(v/total)*100}%; height:100%; background:var(--accent); border-radius:10px"></div></div>
            </div>
        `).join('');
    }
</script>
</body>
</html>
